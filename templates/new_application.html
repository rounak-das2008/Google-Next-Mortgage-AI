{% extends "base.html" %}

{% block title %}New Application{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-hcl-dark-blue mb-2">
        <i class="fas fa-file-alt text-hcl-primary mr-3"></i>New Mortgage Application
    </h1>
    <p class="text-gray-600">Step 1 of 4: Applicant Information</p>
</div>

<div class="mb-6">
    <div class="flex items-center justify-center">
        <div class="progress-step completed">
            <div class="step-circle">1</div>
            <p class="text-xs mt-2 text-center font-medium">Applicant Info</p>
        </div>
        <div class="h-1 flex-1 bg-gray-300 mx-2"></div>
        <div class="progress-step">
            <div class="step-circle">2</div>
            <p class="text-xs mt-2 text-center">Upload Documents</p>
        </div>
        <div class="h-1 flex-1 bg-gray-300 mx-2"></div>
        <div class="progress-step">
            <div class="step-circle">3</div>
            <p class="text-xs mt-2 text-center">Review</p>
        </div>
        <div class="h-1 flex-1 bg-gray-300 mx-2"></div>
        <div class="progress-step">
            <div class="step-circle">4</div>
            <p class="text-xs mt-2 text-center">Submit</p>
        </div>
    </div>
</div>

<div class="card-hcl max-w-2xl mx-auto">
    <form method="POST" action="/broker/new-application" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                <i class="fas fa-user-circle mr-2 text-hcl-primary"></i>Applicant Name
            </label>
            <input type="text" name="applicant_name" required 
                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-hcl-primary focus:outline-none transition"
                   placeholder="Enter full name">
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                <i class="fas fa-building mr-2 text-hcl-primary"></i>Applicant Type
            </label>
            <select name="applicant_type" required 
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-hcl-primary focus:outline-none transition">
                <option value="">Select Type</option>
                <option value="Individual">Individual (Person)</option>
                <option value="Company">Company</option>
                <option value="Trust">Trust</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                <i class="fas fa-user-tag mr-2 text-hcl-primary"></i>Applicant Role
            </label>
            <select name="applicant_role" required 
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-hcl-primary focus:outline-none transition">
                <option value="">Select Role</option>
                <option value="Primary Applicant">Primary Applicant</option>
                <option value="Co-Applicant">Co-Applicant</option>
                <option value="Guarantor">Guarantor</option>
            </select>
        </div>

        <div class="flex space-x-4 pt-4">
            <a href="/broker/dashboard" class="flex-1 btn-hcl-secondary text-center">
                <i class="fas fa-arrow-left mr-2"></i>Cancel
            </a>
            <button type="submit" class="flex-1 btn-hcl-primary">
                Next: Upload Documents <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>
    </form>
</div>
{% endblock %}
